plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        // Use Java 26 to match the project's configured toolchain
        languageVersion = JavaLanguageVersion.of(26)
    }
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['src/resources']
        }
    }
}

// Use JavaFX version that matches the project Java toolchain
def javafxVersion = '26'
def javafxModules = ['javafx.controls', 'javafx.fxml', 'javafx.media']

def javafxPlatform() {
    def osName = System.getProperty('os.name').toLowerCase()
    def arch = System.getProperty('os.arch').toLowerCase()
    if (osName.contains('win')) {
        return 'win'
    }
    if (osName.contains('mac')) {
        return arch.contains('aarch64') || arch.contains('arm64') ? 'mac-aarch64' : 'mac'
    }
    if (osName.contains('linux')) {
        return arch.contains('aarch64') || arch.contains('arm64') ? 'linux-aarch64' : 'linux'
    }
    throw new GradleException("Unsupported OS: ${osName} / ${arch}")
}

dependencies {
    implementation "org.openjfx:javafx-base:${javafxVersion}:${javafxPlatform()}"
    implementation "org.openjfx:javafx-graphics:${javafxVersion}:${javafxPlatform()}"
    implementation "org.openjfx:javafx-controls:${javafxVersion}:${javafxPlatform()}"
    implementation "org.openjfx:javafx-fxml:${javafxVersion}:${javafxPlatform()}"
    implementation "org.openjfx:javafx-media:${javafxVersion}:${javafxPlatform()}"
    implementation 'tech.tablesaw:tablesaw-core:0.44.0'
    implementation 'com.google.code.gson:gson:2.10.1'
}

application {
    mainClass = 'view.GameGUI'
}

def javafxRuntimeClasspath = files(configurations.runtimeClasspath.filter { it.name.startsWith('javafx-') })
def applicationRuntimeClasspath = files(sourceSets.main.runtimeClasspath.filter { !it.name.startsWith('javafx-') })

def javafxJvmArgs = [
    '--module-path', javafxRuntimeClasspath.asPath,
    '--add-modules', javafxModules.join(',')
]

tasks.register('runTextGame', JavaExec) {
    group = 'application'
    description = 'Run the terminal text game'
    classpath = applicationRuntimeClasspath
    mainClass.set('controller.Main')
    jvmArgs = javafxJvmArgs
}

tasks.register('runGui', JavaExec) {
    group = 'application'
    description = 'Run the JavaFX GUI'
    classpath = applicationRuntimeClasspath
    mainClass.set('view.GameGUI')
    jvmArgs = javafxJvmArgs
}

tasks.register('runSaveLoadTest', JavaExec) {
    group = 'verification'
    description = 'Run the save/load test harness'
    classpath = applicationRuntimeClasspath
    mainClass.set('controller.SaveLoadTester')
    jvmArgs = javafxJvmArgs
}

tasks.register('runBarricadeMonteCarloTest', JavaExec) {
    group = 'verification'
    description = 'Run 100-run barricade behavior simulation'
    classpath = applicationRuntimeClasspath
    mainClass.set('controller.BarricadeMonteCarloTester')
    jvmArgs = javafxJvmArgs
}

tasks.register('runGUI') {
    group = 'application'
    description = 'Alias for runGui'
    dependsOn tasks.named('runGui')
}

tasks.register('rungui') {
    group = 'application'
    description = 'Lowercase alias for runGui'
    dependsOn tasks.named('runGui')
}
